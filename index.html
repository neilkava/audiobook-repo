<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Midnight Ark — An Audiobook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Ark silhouette -->
<svg class="ark-silhouette" viewBox="0 0 120 70" fill="#000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8d6" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#ffe066" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampGlowInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8d6" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffe066" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ark / boat -->
  <path d="M8,56 C22,49 48,46 60,48 C72,46 98,49 112,56 L108,63 C90,59 70,61 60,61 C50,61 30,59 12,63 Z"/>

  <!-- Boy standing (right side) -->
  <path d="M86,49 L86,26 C86,24 88,24 88,26 L88,49" fill="#000"/>
  <circle cx="87" cy="21" r="4.5" fill="#000"/>
  <path d="M86,31 L79,36 L78,35" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M88,31 L95,36" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M86,49 L83,57" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M88,49 L91,57" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Girl sitting (left side), pointing at sky -->
  <path d="M43,49 L43,32 C43,30 45,30 45,32 L45,49" fill="#000"/>
  <circle cx="44" cy="27" r="4.5" fill="#000"/>
  <path d="M44,34 L35,18 L34,16" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M45,34 L52,39" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M45,49 L38,53" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M43,49 L36,46 L40,51" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lamp glow -->
  <circle cx="68" cy="37" r="18" fill="url(#lampGlow)"/>
  <circle cx="68" cy="37" r="10" fill="url(#lampGlowInner)"/>

  <!-- Lamp body -->
  <rect x="66" y="41" width="4" height="5" rx="1" fill="#000"/>

  <!-- Lamp light (core) -->
  <circle cx="68" cy="37" r="2.5" fill="#ffe066"/>
  <circle cx="68" cy="37" r="1" fill="#fff8d6"/>
</svg>

<!-- Content -->
<div class="content">
  <header>
    <div class="label" id="pageLabel"></div>
    <h1 id="pageTitle"></h1>
    <div class="sub" id="pageSubtitle"></div>
  </header>
  <div class="divider"></div>

  <div class="chapter-list" id="chapterList"></div>

  <footer>
    <span id="footerLine1"></span><br>
    <span id="footerLine2"></span>
  </footer>
</div>

<!-- Player bar -->
<div class="player-bar">
  <div class="track-info" id="trackInfo">Select a chapter</div>
  <div class="controls">
    <button id="prevBtn" title="Previous chapter">&#9664;</button>
    <button class="play-btn" id="playBtn" title="Play / Pause"><svg width="14" height="16" viewBox="0 0 14 16"><path d="M1.5 0L13.5 8L1.5 16Z" fill="currentColor"/></svg></button>
    <button id="nextBtn" title="Next chapter">&#9654;</button>
  </div>
  <div class="progress-wrap">
    <span class="time" id="currentTime">0:00</span>
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="time" id="totalTime">0:00</span>
  </div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
<script>
document.getElementById('pageLabel').textContent = CONFIG.label;
document.getElementById('pageTitle').textContent = CONFIG.title;
document.getElementById('pageSubtitle').textContent = CONFIG.subtitle;
document.getElementById('footerLine1').textContent = CONFIG.footerLine1;
document.getElementById('footerLine2').textContent = CONFIG.footerLine2;
</script>
</body>
</html>
